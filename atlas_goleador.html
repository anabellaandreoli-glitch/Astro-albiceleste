<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Astro Albiceleste — Los goles de Messi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
:root{
  --pitch-dark:#1A3529;
  --pitch-line:#20503C;
  --land:#276B4E;
  --land-stroke:#151f30;
  --albiceleste:#6EC3F5;
  --albiceleste-deep:#2E86D6;
  --white:#FAF8F2;
  --amber:#FFB300;
  --ink:#122B21;
  --card:#123A29;
  --muted:#9FCBB4;
  --correct-bg:#155C34;
  --correct-border:#4ADE80;
  --wrong-bg:#6B1F26;
  --wrong-border:#F87171;

  --glass-bg:rgba(20,40,34,0.66);
  --glass-bg-strong:rgba(18,34,29,0.82);
  --glass-border:rgba(255,255,255,0.09);
  --glass-blur:18px;
  --r-lg:20px;
  --r-md:14px;
  --r-sm:10px;
  --r-pill:999px;
  --shadow-float:0 14px 40px rgba(0,0,0,0.45);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;overflow:hidden;}
body{
  background:var(--pitch-dark);
  color:var(--white);
  font-family:'Inter',sans-serif;
  width:100vw; height:100vh;
}

/* ============ ESCENARIO: EL MAPA A PANTALLA COMPLETA ============ */
.map-stage{ position:fixed; inset:0; }
.geo-map{
  width:100%; height:100%; display:block; cursor:grab; touch-action:none;
  background:
    radial-gradient(ellipse at 50% 32%, rgba(255,255,255,0.35) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 40%, #C6CBCA 0%, #B2B8B7 100%);
}
.zoom-controls{
  position:fixed; right:18px; bottom:96px; z-index:410;
  display:flex; flex-direction:column; border-radius:var(--r-md); overflow:hidden;
}
.zoom-btn{
  width:38px; height:38px; border:none; color:var(--white); font-size:19px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; font-family:'Inter',sans-serif;
  border-radius:0;
}
.zoom-btn:first-child{ border-bottom:1px solid var(--glass-border); }
.zoom-btn:hover{ background:var(--glass-bg-strong); }
.geo-map .land{ fill:url(#landBase); fill-opacity:0.78; stroke:#0F3527; stroke-width:0.15; stroke-opacity:0.4; transition:opacity .6s ease; }
.geo-map.dimmed .land{ opacity:0.35; }
.marker{
  cursor:pointer; stroke:var(--white); stroke-width:1.1; opacity:0.95;
  transition:opacity .2s, stroke-width .2s, filter .3s;
  filter:drop-shadow(0 0 3.5px currentColor);
}
.marker:hover{ opacity:1; stroke:var(--amber); stroke-width:1.8; filter:drop-shadow(0 0 8px currentColor); }
.marker.dim{ opacity:0.05; pointer-events:none; filter:none; }
.marker.foco{
  stroke:var(--amber); stroke-width:2.2;
  filter:drop-shadow(0 0 10px rgba(255,179,0,.85));
  animation:foco-pulse 1.8s ease-in-out infinite;
}
@keyframes foco-pulse{
  0%,100%{ filter:drop-shadow(0 0 8px rgba(255,179,0,.7)); }
  50%{ filter:drop-shadow(0 0 16px rgba(255,179,0,1)); }
}
.geo-map.oculto .marker.foco{ opacity:0; }
.map-veil{
  position:fixed; inset:0; pointer-events:none; opacity:0; transition:opacity .5s ease;
  background:radial-gradient(circle at 50% 46%, transparent 0%, rgba(5,15,11,0.15) 55%, rgba(5,15,11,0.55) 100%);
}
.map-veil.on{ opacity:1; }
.map-fog{
  position:fixed; inset:0; pointer-events:none; opacity:0; transition:opacity .6s ease;
  backdrop-filter:blur(0px); background:rgba(5,14,10,0);
}
.map-fog.on{ opacity:1; backdrop-filter:blur(3px); background:rgba(5,14,10,0.28); }

/* ============ VIDRIO: LENGUAJE VISUAL COMPARTIDO ============ */
.glass{
  background:var(--glass-bg);
  backdrop-filter:blur(var(--glass-blur)) saturate(1.3);
  -webkit-backdrop-filter:blur(var(--glass-blur)) saturate(1.3);
  border:1px solid var(--glass-border);
  box-shadow:var(--shadow-float);
}

/* ============ HUD SUPERIOR FLOTANTE ============ */
.hud-top{
  position:fixed; top:16px; left:16px; right:16px; z-index:500;
  display:flex; align-items:center; justify-content:space-between; gap:14px;
  pointer-events:none;
}
.hud-top > *{ pointer-events:auto; }
.hud-brand{
  display:flex; align-items:center; gap:10px;
  padding:8px 18px 8px 12px; border-radius:var(--r-pill); white-space:nowrap;
}
.hud-brand .flagbox{ display:inline-flex; width:26px; height:19px; border-radius:3px; overflow:hidden; box-shadow:0 0 0 1px rgba(255,255,255,.15); flex-shrink:0; }
.hud-brand .flagbox svg{ display:block; }
.hud-brand-text{ display:flex; flex-direction:column; gap:1px; line-height:1.15; }
.hud-brand-text .titulo{ font-family:'Anton',sans-serif; font-size:15px; letter-spacing:.5px; }
.hud-brand-text .subtitulo{ font-family:'Inter',sans-serif; font-size:10px; color:var(--albiceleste); font-weight:500; letter-spacing:.1px; }
.hud-stats{
  display:flex; gap:4px; padding:6px; border-radius:var(--r-pill);
  font-family:'Space Mono',monospace;
}
.hud-stat{ text-align:center; padding:4px 14px; border-radius:var(--r-pill); }
.hud-stat .num{ font-family:'Anton',sans-serif; font-size:18px; color:var(--amber); line-height:1; font-variant-numeric:tabular-nums; }
.hud-stat .lbl{ font-size:8.5px; letter-spacing:1.2px; text-transform:uppercase; color:var(--muted); }
.hud-actions{ display:flex; gap:8px; }
.hud-icon-btn{
  width:42px; height:42px; border-radius:50%; border:1px solid var(--glass-border);
  background:var(--glass-bg); color:var(--white); cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:background .2s, transform .15s;
}
.hud-icon-btn:hover{ background:var(--glass-bg-strong); transform:scale(1.06); }
.hud-icon-btn svg{ width:19px; height:19px; }
.hud-icon-btn.active{ background:var(--albiceleste); border-color:var(--albiceleste); }
.hud-icon-btn.active svg{ stroke:var(--ink); }

/* ============ PANEL DE FILTROS (drawer flotante) ============ */
.filter-drawer{
  position:fixed; top:76px; left:16px; z-index:480; width:280px;
  border-radius:var(--r-lg); padding:18px;
  display:flex; flex-direction:column; gap:16px;
  transform:translateX(-110%); opacity:0; transition:transform .35s cubic-bezier(.22,.9,.32,1), opacity .3s ease;
  max-height:calc(100vh - 100px); overflow-y:auto;
}
.filter-drawer.open{ transform:translateX(0); opacity:1; }
.filter-group h3{
  font-family:'Anton',sans-serif; font-size:11.5px; letter-spacing:1.4px; text-transform:uppercase;
  color:var(--albiceleste); margin:0 0 9px 0;
}
.filter-drawer select, .filter-drawer input[type=text]{
  width:100%; background:rgba(0,0,0,0.28); color:var(--white); border:1px solid var(--glass-border);
  border-radius:var(--r-sm); padding:9px 11px; font-family:'Inter',sans-serif; font-size:13.5px;
}
.filter-drawer select:focus, .filter-drawer input:focus{ outline:2px solid var(--amber); }
.chips{ display:flex; flex-wrap:wrap; gap:6px; }
.chip{
  background:rgba(0,0,0,0.28); border:1px solid var(--glass-border); color:var(--muted);
  border-radius:var(--r-pill); padding:6px 12px; font-size:12px; cursor:pointer; transition:.15s; user-select:none;
}
.chip:hover{ border-color:var(--albiceleste); color:var(--white); }
.chip.active{ background:var(--albiceleste); color:var(--ink); border-color:var(--albiceleste); font-weight:700; }
.year-range{ display:flex; align-items:center; gap:8px; font-family:'Space Mono',monospace; font-size:12px; color:var(--amber);}
input[type=range]{ width:100%; accent-color:var(--amber); }
.reset-btn{
  background:transparent; border:1px solid var(--muted); color:var(--muted); border-radius:var(--r-sm);
  padding:9px; font-size:12px; cursor:pointer; width:100%;
}
.reset-btn:hover{ color:var(--white); border-color:var(--white); }

/* ============ PÍLDORA DE RESULTADOS ============ */
.result-pill{
  position:fixed; bottom:20px; left:16px; z-index:400;
  padding:9px 16px; border-radius:var(--r-pill);
  font-family:'Space Mono',monospace; font-size:12px; color:var(--albiceleste);
  transition:transform .3s ease;
}

/* ============ FICHA DE PARTIDO (click en un punto) ============ */
.info-card{
  position:absolute; border-radius:var(--r-md); padding:13px 16px; font-family:'Inter',sans-serif;
  min-width:200px; max-width:270px; z-index:600; display:none; pointer-events:none;
  transform:translateY(6px) scale(.96); opacity:0; transition:transform .18s ease, opacity .18s ease;
}
.info-card.show{ display:block; transform:translateY(0) scale(1); opacity:1; pointer-events:auto; }
.info-card .rivalname{ font-family:'Anton',sans-serif; font-size:17px; color:var(--amber); letter-spacing:.5px; }
.info-card .meta{ font-size:11.5px; color:var(--muted); margin:3px 0; }
.info-card .score{ font-family:'Space Mono',monospace; font-size:15px; color:var(--albiceleste); margin-top:4px; }
.info-card .goles{ color:var(--amber); font-weight:700; }
.info-card .estadio-titulo{ font-family:'Anton',sans-serif; font-size:15px; color:var(--white); letter-spacing:.3px; }
.info-card .lista-partidos{ max-height:220px; overflow-y:auto; display:flex; flex-direction:column; gap:2px; margin:0 -6px; padding:0 6px; }
.info-card .ficha-partido{ padding:8px 0; border-top:1px solid rgba(255,255,255,0.08); }
.info-card .ficha-partido:first-child{ border-top:none; }
.info-card .ficha-partido .rivalname{ font-size:14.5px; }

/* ============ BOTÓN FLOTANTE DE TRIVIA (FAB) ============ */
.fab-trivia{
  position:fixed; bottom:20px; right:20px; z-index:520;
  height:52px; padding:0 20px 0 6px; border:none; cursor:pointer;
  border-radius:var(--r-pill); display:flex; align-items:center; gap:10px;
  background:linear-gradient(180deg,
    #75AADB 0%, #75AADB 30%,
    #F6F4EC 30%, #F6F4EC 70%,
    #75AADB 70%, #75AADB 100%);
  border:1px solid rgba(255,255,255,0.55);
  box-shadow:0 10px 28px rgba(0,0,0,.45), 0 3px 0 #1c5f96;
  transition:transform .15s ease;
}
.fab-trivia:hover{ transform:translateY(-2px) scale(1.02); }
.fab-trivia:active{ transform:translateY(1px) scale(0.98); }
.fab-trivia .medallon10{
  display:flex; align-items:center; justify-content:center;
  width:40px; height:40px; border-radius:50%; flex-shrink:0;
  background:radial-gradient(circle at 35% 30%, #A9D9F7, var(--albiceleste) 55%, var(--albiceleste-deep) 100%);
  color:var(--ink); font-family:'Anton',sans-serif; font-size:19px;
  box-shadow:0 0 0 2px rgba(255,255,255,0.7), inset 0 1px 2px rgba(255,255,255,0.5);
}
.fab-trivia .jugar-txt{
  font-family:'Anton',sans-serif; font-size:19px; letter-spacing:1px; color:var(--ink);
  text-shadow:0 1px 1px rgba(255,255,255,.35);
}
.fab-trivia.hide{ transform:translateY(130px) scale(0.7); opacity:0; pointer-events:none; }

/* ============ HOJA DESLIZANTE DE TRIVIA (bottom sheet) ============ */
.trivia-sheet{
  position:fixed; left:0; right:0; bottom:0; z-index:700;
  max-width:640px; margin:0 auto;
  border-radius:24px 24px 0 0; padding:14px 26px 26px;
  transform:translateY(105%); transition:transform .42s cubic-bezier(.19,1,.22,1);
  max-height:78vh; overflow-y:auto;
  border-top:1px solid rgba(180,220,250,0.65);
  border-left:1px solid rgba(180,220,250,0.24);
  border-right:1px solid rgba(180,220,250,0.24);
  box-shadow:0 -4px 40px rgba(0,0,0,0.5), 0 -1px 0 rgba(140,200,245,0.4), inset 0 1px 0 rgba(210,235,255,0.18);
  background-image:
    repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px),
    repeating-linear-gradient(90deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px);
}
.trivia-sheet.open{ transform:translateY(0); }
.sheet-handle{ width:40px; height:4px; border-radius:3px; background:linear-gradient(90deg, transparent, rgba(180,220,250,.6), transparent); margin:0 auto 14px; }
.sheet-close{
  position:absolute; top:16px; right:18px; background:rgba(255,255,255,.06); border:1px solid rgba(180,220,250,0.3); color:var(--muted);
  width:30px; height:30px; border-radius:50%; font-size:18px; cursor:pointer; line-height:1;
}
.sheet-close:hover{ color:var(--white); background:rgba(255,255,255,.12); }
.trivia-card h2{ font-family:'Anton',sans-serif; color:var(--albiceleste); margin:0 0 10px 0; font-size:20px; letter-spacing:.8px; }
.progreso-track{
  width:100%; height:9px; border-radius:var(--r-pill); background:rgba(255,255,255,0.10);
  overflow:hidden; margin-bottom:9px; border:1px solid rgba(140,205,245,0.28);
}
.progreso-fill{
  height:100%; border-radius:var(--r-pill);
  background:linear-gradient(90deg, var(--albiceleste-deep), var(--albiceleste) 55%, #C7E6FA);
  width:0%; transition:width .5s cubic-bezier(.22,.9,.32,1);
  box-shadow:0 0 10px rgba(110,195,245,.7);
}
.trivia-score{ font-family:'Space Mono',monospace; color:var(--white); font-size:13px; margin-bottom:14px; display:flex; align-items:center; gap:10px; letter-spacing:.2px; }
.racha-indicator{
  display:inline-flex; align-items:center; gap:4px;
  background:rgba(110,195,245,0.15); border:1px solid var(--albiceleste);
  color:var(--albiceleste); padding:2px 9px; border-radius:var(--r-pill); font-size:11px;
  opacity:0; transform:scale(0.7); transition:opacity .2s, transform .2s;
}
.racha-indicator.show{ opacity:1; transform:scale(1); }
.trivia-meta{ font-family:'Space Mono',monospace; font-size:11px; color:var(--albiceleste); margin-bottom:12px; letter-spacing:.2px; }
.trivia-question{
  background:rgba(0,0,0,0.22); border-radius:var(--r-md); padding:16px; font-size:14.5px; line-height:1.55;
  margin-bottom:16px; border-left:3px solid var(--albiceleste);
}
.trivia-question .apertura{
  display:block; font-style:italic; color:var(--albiceleste); font-size:12.5px; margin-bottom:7px; letter-spacing:.2px; opacity:0.85;
}
.trivia-question .pregunta-final{ color:var(--albiceleste); font-weight:700; }
.relator-feedback{
  font-family:'Anton',sans-serif; font-size:15px; letter-spacing:.3px; line-height:1.35;
  margin:12px 0 4px; padding:10px 14px; border-radius:var(--r-sm);
  opacity:0; transform:translateY(4px); transition:opacity .35s ease, transform .35s ease;
}
.relator-feedback.show{ opacity:1; transform:translateY(0); }
.relator-feedback.ok{ background:rgba(74,222,128,0.12); color:#8CF0AE; border-left:3px solid var(--correct-border); }
.relator-feedback.no{ background:rgba(248,113,113,0.10); color:#FFB0AC; border-left:3px solid var(--wrong-border); }
.trivia-options{ display:flex; flex-direction:column; gap:8px; }
.opt-btn{
  background:rgba(0,0,0,0.22); border:1px solid var(--glass-border); color:var(--white); padding:12px 14px;
  border-radius:var(--r-sm); text-align:left; font-size:14.5px; cursor:pointer; transition:.15s;
}
.opt-btn:hover:not(:disabled){ border-color:var(--albiceleste); background:rgba(110,195,245,0.08); }
.opt-btn.correct{ background:var(--correct-bg); border-color:var(--correct-border); }
.opt-btn.wrong{ background:var(--wrong-bg); border-color:var(--wrong-border); }
.trivia-actions{ display:flex; justify-content:flex-end; align-items:center; margin-top:16px; }
.next-btn{
  background:var(--albiceleste); color:var(--ink); border:none; border-radius:var(--r-pill); padding:11px 20px;
  font-family:'Anton',sans-serif; letter-spacing:.5px; cursor:pointer; visibility:hidden;
}
.next-btn.show{ visibility:visible; }

/* confeti + racha (sobre la hoja) */
.confetti-layer{ position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:750; }
.confetti-piece{ position:absolute; top:-10px; border-radius:2px; animation: confetti-fall 1.3s ease-in forwards; }
@keyframes confetti-fall{
  0%{ transform:translateY(0) rotate(0deg); opacity:1; }
  100%{ transform:translateY(340px) rotate(540deg); opacity:0; }
}
.racha-banner{
  position:fixed; top:40%; left:50%; transform:translate(-50%,-50%) scale(0.5);
  background:linear-gradient(135deg, var(--amber), #d98f00); color:var(--ink);
  font-family:'Anton',sans-serif; font-size:22px; letter-spacing:1px; padding:14px 26px; border-radius:14px;
  text-align:center; z-index:760; opacity:0; box-shadow:0 8px 24px rgba(0,0,0,0.4);
  animation: racha-pop 1.6s ease forwards; white-space:nowrap;
}
@keyframes racha-pop{
  0%{ opacity:0; transform:translate(-50%,-50%) scale(0.5); }
  15%{ opacity:1; transform:translate(-50%,-50%) scale(1.08); }
  25%{ transform:translate(-50%,-50%) scale(1); }
  80%{ opacity:1; }
  100%{ opacity:0; transform:translate(-50%,-50%) scale(1); }
}

/* texto oculto: desenfoque en vez de bloques de censura */
.masked-term{
  filter:blur(5.5px); -webkit-filter:blur(5.5px); user-select:none; display:inline-block;
  border-radius:4px; background:rgba(110,195,245,0.10); padding:0 2px;
  transition:filter .4s ease, background .4s ease;
}
.masked-term.revelado{ filter:none; -webkit-filter:none; background:rgba(74,222,128,0.16); }

.map-hint{
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:400;
  padding:8px 16px; border-radius:var(--r-pill); font-size:11px; color:var(--muted);
  opacity:0; transition:opacity .4s ease; pointer-events:none;
}
.map-hint.show{ opacity:1; }

::-webkit-scrollbar{ width:6px; }
::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.15); border-radius:4px; }

@media (max-width:760px){
  .hud-stats{ display:none; }
  .filter-drawer{ width:calc(100vw - 32px); }
  .trivia-sheet{ max-width:100%; }
}
</style>
</head>
<body>

<div class="map-stage">
  <svg id="mapSvg" class="geo-map" viewBox="30.767 241.591 784.077 458.627" preserveAspectRatio="xMidYMid meet"></svg>
</div>
<div class="map-veil" id="mapVeil"></div>
<div class="map-fog" id="mapFog"></div>
<div class="info-card glass" id="infoCard"></div>
<div class="map-hint glass" id="mapHint">Tocá un punto del mapa para ver el partido</div>

<div class="zoom-controls">
  <button class="zoom-btn glass" id="zoomIn" title="Acercar">+</button>
  <button class="zoom-btn glass" id="zoomOut" title="Alejar">−</button>
</div>

<div class="hud-top">
  <div class="hud-brand glass">
    <span class="flagbox">
      <svg viewBox="0 0 26 19" width="26" height="19">
        <rect width="26" height="6.3" fill="#75AADB"/>
        <rect y="6.3" width="26" height="6.4" fill="#F6F4EC"/>
        <rect y="12.7" width="26" height="6.3" fill="#75AADB"/>
        <g transform="translate(13,9.5)">
          <circle r="2.6" fill="#F2A900" stroke="#8a5a00" stroke-width="0.3"/>
          <g stroke="#8a5a00" stroke-width="0.4">
            <line x1="0" y1="-4.1" x2="0" y2="-2.7"/><line x1="0" y1="4.1" x2="0" y2="2.7"/>
            <line x1="-4.1" y1="0" x2="-2.7" y2="0"/><line x1="4.1" y1="0" x2="2.7" y2="0"/>
            <line x1="-2.9" y1="-2.9" x2="-1.9" y2="-1.9"/><line x1="2.9" y1="2.9" x2="1.9" y2="1.9"/>
            <line x1="-2.9" y1="2.9" x2="-1.9" y2="1.9"/><line x1="2.9" y1="-2.9" x2="1.9" y2="-1.9"/>
          </g>
        </g>
      </svg>
    </span>
    <span class="hud-brand-text">
      <span class="titulo">El Astro Albiceleste</span>
      <span class="subtitulo">Los goles de Messi con la Selección</span>
    </span>
  </div>
  <div class="hud-stats glass">
    <div class="hud-stat"><div class="num" id="statGoles">0</div><div class="lbl">Goles</div></div>
    <div class="hud-stat"><div class="num" id="statPartidos">0</div><div class="lbl">Partidos</div></div>
    <div class="hud-stat"><div class="num" id="statRivales">0</div><div class="lbl">Rivales</div></div>
    <div class="hud-stat"><div class="num" id="statAnios">0</div><div class="lbl">Temporadas</div></div>
  </div>
  <div class="hud-actions">
    <button class="hud-icon-btn glass" id="filterToggle" title="Filtros">

let mapAnimId = null;
function getCurrentViewBox(){
  const vb = mapSvg.getAttribute('viewBox').split(' ').map(Number);
  return {x:vb[0], y:vb[1], w:vb[2], h:vb[3]};
}
function easeInOutCubic(t){ return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }
function animateMapTo(targetX, targetY, targetW, duration=900, onDone){
  if(mapAnimId) cancelAnimationFrame(mapAnimId);
  const start = getCurrentViewBox();
  const targetH = targetW * (MAP_VIEWBOX.h/MAP_VIEWBOX.w);
  const t0 = performance.now();
  function step(now){
    const t = Math.min(1, (now-t0)/duration);
    const e = easeInOutCubic(t);
    const x = start.x + (targetX-start.x)*e;
    const y = start.y + (targetY-start.y)*e;
    const w = start.w + (targetW-start.w)*e;
    const h = start.h + (targetH-start.h)*e;
    mapSvg.setAttribute('viewBox', `${x} ${y} ${w} ${h}`);
    if(t<1){ mapAnimId = requestAnimationFrame(step); }
    else if(onDone){ onDone(); }
  }
  mapAnimId = requestAnimationFrame(step);
}
function focusOnPoint(px, py, zoomW, duration, onDone){
  const targetX = px - zoomW/2;
  const targetY = py - (zoomW*(MAP_VIEWBOX.h/MAP_VIEWBOX.w))/2;
  animateMapTo(targetX, targetY, zoomW, duration, onDone);
}
function resetMapView(duration=900){
  animateMapTo(MAP_VIEWBOX.x, MAP_VIEWBOX.y, MAP_VIEWBOX.w, duration);
}

// ---------- ZOOM Y PANEO MANUAL: rueda del mouse, pellizco táctil, arrastre y botones +/- ----------
const ZOOM_MIN_W = 18;   // acercamiento máximo (nivel de un estadio puntual)
const ZOOM_MAX_W = MAP_VIEWBOX.w; // el mundo completo

function svgToScreenScale(){
  const rect = mapSvg.getBoundingClientRect();
  const vb = getCurrentViewBox();
  return { rect, vb, scaleX: vb.w/rect.width, scaleY: vb.h/rect.height };
}
function screenToSvgPoint(clientX, clientY){
  const { rect, vb, scaleX, scaleY } = svgToScreenScale();
  return { x: vb.x + (clientX-rect.left)*scaleX, y: vb.y + (clientY-rect.top)*scaleY };
}
function zoomAt(clientX, clientY, factor){
  if(mapAnimId) cancelAnimationFrame(mapAnimId);
  const p = screenToSvgPoint(clientX, clientY);
  const vb = getCurrentViewBox();
  let newW = vb.w * factor;
  newW = Math.max(ZOOM_MIN_W, Math.min(ZOOM_MAX_W, newW));
  const newH = newW * (MAP_VIEWBOX.h/MAP_VIEWBOX.w);
  // mantener el punto bajo el cursor fijo mientras se hace zoom
  const ratioX = (p.x - vb.x) / vb.w;
  const ratioY = (p.y - vb.y) / vb.h;
  const newX = p.x - ratioX*newW;
  const newY = p.y - ratioY*newH;
  mapSvg.setAttribute('viewBox', `${newX} ${newY} ${newW} ${newH}`);
}
function zoomStep(factor){
  const rect = mapSvg.getBoundingClientRect();
  zoomAt(rect.left+rect.width/2, rect.top+rect.height/2, factor);
}

// rueda del mouse
mapSvg.addEventListener('wheel', (e)=>{
  e.preventDefault();
  const factor = e.deltaY > 0 ? 1.18 : 0.84;
  zoomAt(e.clientX, e.clientY, factor);
}, { passive:false });

// arrastre para panear (mouse)
let arrastrando = false, ultimoX = 0, ultimoY = 0, seMovio = false;
mapSvg.addEventListener('mousedown', (e)=>{
  arrastrando = true; seMovio = false; ultimoX = e.clientX; ultimoY = e.clientY;
  mapSvg.style.cursor = 'grabbing';
});
window.addEventListener('mousemove', (e)=>{
  if(!arrastrando) return;
  const dx = e.clientX - ultimoX, dy = e.clientY - ultimoY;
  if(Math.abs(dx)>2 || Math.abs(dy)>2) seMovio = true;
  if(!seMovio) return;
  const { vb, scaleX, scaleY } = svgToScreenScale();
  mapSvg.setAttribute('viewBox', `${vb.x - dx*scaleX} ${vb.y - dy*scaleY} ${vb.w} ${vb.h}`);
  ultimoX = e.clientX; ultimoY = e.clientY;
});
window.addEventListener('mouseup', ()=>{
  if(arrastrando){ arrastrando = false; mapSvg.style.cursor = 'grab'; }
});

// pellizco táctil (mobile) + arrastre táctil
let touchState = null;
mapSvg.addEventListener('touchstart', (e)=>{
  if(e.touches.length===1){
    touchState = { modo:'pan', x:e.touches[0].clientX, y:e.touches[0].clientY };
  } else if(e.touches.length===2){
    const [t1,t2] = e.touches;
    touchState = {
      modo:'pinch',
      dist: Math.hypot(t2.clientX-t1.clientX, t2.clientY-t1.clientY),
      cx: (t1.clientX+t2.clientX)/2, cy: (t1.clientY+t2.clientY)/2
    };
  }
}, { passive:true });
mapSvg.addEventListener('touchmove', (e)=>{
  if(!touchState) return;
  if(touchState.modo==='pan' && e.touches.length===1){
    const dx = e.touches[0].clientX - touchState.x, dy = e.touches[0].clientY - touchState.y;
    const { vb, scaleX, scaleY } = svgToScreenScale();
    mapSvg.setAttribute('viewBox', `${vb.x - dx*scaleX} ${vb.y - dy*scaleY} ${vb.w} ${vb.h}`);
    touchState.x = e.touches[0].clientX; touchState.y = e.touches[0].clientY;
  } else if(touchState.modo==='pinch' && e.touches.length===2){
    const [t1,t2] = e.touches;
    const dist = Math.hypot(t2.clientX-t1.clientX, t2.clientY-t1.clientY);
    const factor = touchState.dist / dist;
    zoomAt(touchState.cx, touchState.cy, factor);
    touchState.dist = dist;
  }
}, { passive:true });
mapSvg.addEventListener('touchend', ()=>{ touchState = null; });

document.getElementById('zoomIn').addEventListener('click', ()=>zoomStep(0.7));
document.getElementById('zoomOut').addEventListener('click', ()=>zoomStep(1.4));

function svgPointToScreen(svgEl, x, y){
  const pt = svgEl.createSVGPoint();
  pt.x = x; pt.y = y;
  const screenPt = pt.matrixTransform(svgEl.getScreenCTM());
  return screenPt;
}
function showInfoCard(x, y, html){
  const pt = svgPointToScreen(mapSvg, x, y);
  infoCard.innerHTML = html;
  infoCard.classList.add('show');
  let left = pt.x + 16;
  let top = pt.y - 10;
  if(left + 220 > window.innerWidth) left = pt.x - 234;
  infoCard.style.left = left + 'px';
  infoCard.style.top = top + 'px';
}
function hideInfoCard(){ infoCard.classList.remove('show'); }

function buildMarkers(){
  markersGroup.innerHTML = '';
  // agrupar partidos por coordenada exacta (mismo estadio) para desparramarlos visualmente
  // y para poder mostrar la lista completa de goles de ese estadio al tocar cualquiera de ellos
  const grupos = {};
  PARTIDOS.forEach(p=>{
    if(p.svg_x == null) return;
    const key = p.svg_x + ',' + p.svg_y;
    (grupos[key] = grupos[key] || []).push(p);
  });

  function fichaPartido(p){
    return `
      <div class="ficha-partido">
        <div class="rivalname">vs. ${p.rival}</div>
        <div class="meta">${p.fecha} · ${p.competencia}</div>
        <div class="score">${p.resultado_final} <span class="goles">⚽×${p.goles_messi}</span></div>
      </div>`;
  }

  Object.values(grupos).forEach(grupo=>{
    const n = grupo.length;
    grupo.forEach((p, i)=>{
      let cx = p.svg_x, cy = p.svg_y;
      if(n > 1){
        const radio = 3.2 + n * 0.15;
        const angulo = (2 * Math.PI * i) / n;
        cx += radio * Math.cos(angulo);
        cy += radio * Math.sin(angulo);
      }
      const c = document.createElementNS(SVG_NS,'circle');
      c.setAttribute('cx', cx);
      c.setAttribute('cy', cy);
      c.setAttribute('r', golRadius(p.goles_messi));
      c.setAttribute('fill', golColor(p.goles_messi));
      c.style.color = golColor(p.goles_messi);
      c.setAttribute('class','marker');
      c.dataset.id = p.id;
      c.addEventListener('click', (e)=>{
        e.stopPropagation();
        let html;
        if(n > 1){
          html = `<div class="estadio-titulo">${p.estadio}</div><div class="meta" style="margin-bottom:8px;">${n} goles en este estadio</div>
            <div class="lista-partidos">${grupo.map(fichaPartido).join('')}</div>`;
        } else {
          html = `${fichaPartido(p)}<div class="meta" style="margin-top:2px;">${p.estadio}</div>`;
        }
        showInfoCard(cx, cy, html);
      });
      markersGroup.appendChild(c);
    });
  });
  document.body.addEventListener('click', hideInfoCard);
  mapSvg.addEventListener('click', (e)=>{ if(e.target===mapSvg) hideInfoCard(); });
}

function applyMarkerVisibility(list){
  const idsVisible = new Set(list.map(p=>p.id));
  markersGroup.querySelectorAll('circle').forEach(c=>{
    const id = parseInt(c.dataset.id);
    c.classList.toggle('dim', !idsVisible.has(id));
  });
  document.getElementById('resultCount').textContent = `${list.length} partido(s) · ${list.reduce((a,p)=>a+p.goles_messi,0)} goles en pantalla`;
}

// ---------- STATS con efecto de contador (suma desde 0, tipografía Anton del logo) ----------
function animarContador(el, valorFinal, duracion=1400){
  const inicio = performance.now();
  function paso(now){
    const t = Math.min(1, (now-inicio)/duracion);
    const e = 1 - Math.pow(1-t, 3); // ease-out cúbico: arranca rápido, frena al llegar
    el.textContent = Math.round(valorFinal * e);
    if(t < 1) requestAnimationFrame(paso);
    else el.textContent = valorFinal;
  }
  requestAnimationFrame(paso);
}
function setStats(){
  const totalGoles = PARTIDOS.reduce((a,p)=>a+p.goles_messi,0);
  const totalPartidos = PARTIDOS.length;
  const totalRivales = new Set(PARTIDOS.map(p=>p.rival)).size;
  const anios = PARTIDOS.map(p=>p.anio);
  const totalTemporadas = Math.max(...anios)-Math.min(...anios)+1;

  animarContador(document.getElementById('statGoles'), totalGoles, 1600);
  animarContador(document.getElementById('statPartidos'), totalPartidos, 1300);
  animarContador(document.getElementById('statRivales'), totalRivales, 1100);
  animarContador(document.getElementById('statAnios'), totalTemporadas, 900);
}

// ---------- FILTROS ----------
const competencias = [...new Set(PARTIDOS.map(p=>p.competencia))].sort();
const rivales = [...new Set(PARTIDOS.map(p=>p.rival))].sort();
let activeComp = new Set();

function buildFilterUI(){
  const chipsEl = document.getElementById('compChips');
  competencias.forEach(c=>{
    const chip = document.createElement('div');
    chip.className='chip';
    chip.textContent=c;
    chip.onclick=()=>{
      if(activeComp.has(c)){ activeComp.delete(c); chip.classList.remove('active'); }
      else { activeComp.add(c); chip.classList.add('active'); }
      applyFilters();
    };
    chipsEl.appendChild(chip);
  });
  const rivalSel = document.getElementById('rivalSelect');
  rivales.forEach(r=>{
    const opt = document.createElement('option');
    opt.value=r; opt.textContent=r;
    rivalSel.appendChild(opt);
  });
  const minY = Math.min(...PARTIDOS.map(p=>p.anio));
  const maxY = Math.max(...PARTIDOS.map(p=>p.anio));
  document.getElementById('yearMin').min=minY; document.getElementById('yearMin').max=maxY; document.getElementById('yearMin').value=minY;
  document.getElementById('yearMax').min=minY; document.getElementById('yearMax').max=maxY; document.getElementById('yearMax').value=maxY;
  updateYearLabel();
}
function updateYearLabel(){
  document.getElementById('yearLabel').textContent = `${document.getElementById('yearMin').value} — ${document.getElementById('yearMax').value}`;
}

function applyFilters(){
  const q = document.getElementById('searchBox').value.trim().toLowerCase();
  const rivalVal = document.getElementById('rivalSelect').value;
  let yMin = parseInt(document.getElementById('yearMin').value);
  let yMax = parseInt(document.getElementById('yearMax').value);
  if(yMin>yMax){ [yMin,yMax]=[yMax,yMin]; }
  updateYearLabel();

  filtered = PARTIDOS.filter(p=>{
    if(activeComp.size>0 && !activeComp.has(p.competencia)) return false;
    if(rivalVal && p.rival!==rivalVal) return false;
    if(p.anio<yMin || p.anio>yMax) return false;
    if(q && !(p.rival.toLowerCase().includes(q) || p.estadio.toLowerCase().includes(q))) return false;
    return true;
  });
  applyMarkerVisibility(filtered);
}

document.getElementById('searchBox').addEventListener('input', applyFilters);
document.getElementById('rivalSelect').addEventListener('change', applyFilters);
document.getElementById('yearMin').addEventListener('input', applyFilters);
document.getElementById('yearMax').addEventListener('input', applyFilters);
document.getElementById('resetBtn').addEventListener('click', ()=>{
  document.getElementById('searchBox').value='';
  document.getElementById('rivalSelect').value='';
  activeComp.clear();
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  const minY = Math.min(...PARTIDOS.map(p=>p.anio));
  const maxY = Math.max(...PARTIDOS.map(p=>p.anio));
  document.getElementById('yearMin').value=minY;
  document.getElementById('yearMax').value=maxY;
  applyFilters();
});

  "Bosnia y Herzegovina":["bosni"], "Brasil":["brasileñ","brasiler"], "Canadá":["canadiens"],
  "Chile":["chilen"], "Colombia":["colombian"], "Croacia":["croat"], "Curazao":["curazoleñ"],
  "Ecuador":["ecuatorian"], "Emiratos Árabes Unidos":["emirat"], "Eslovenia":["esloven"],
  "España":["español","hispan"], "Estados Unidos":["estadounidens","norteamerican"],
  "Estonia":["eston"], "Francia":["frances","francés","francesa"], "Guatemala":["guatemaltec"],
  "Haití":["haitian"], "Honduras":["hondureñ"], "Hong Kong":["hongkones"], "Irán":["irani","iraní","iraniz"],
  "Islandia":["island"], "Jamaica":["jamaican","jamaiquin"], "México":["mexican","mejican"],
  "Nicaragua":["nicaraguens","nicaragüens"], "Nigeria":["nigerian"], "Panamá":["panameñ"],
  "Paraguay":["paraguay"], "Países Bajos":["holandes","holandés","neerlandes"], "Perú":["peruan"],
  "Portugal":["portugues","portugués","portuguesa"], "Serbia y Montenegro":["serbi","montenegrin"],
  "Suiza":["suiz"], "Uruguay":["uruguay"], "Venezuela":["venezolan"], "Zambia":["zambian"],
  "Jordania":["jordan"], "Cabo Verde":["caboverdian"], "Egipto":["egipci"]
};
function ocultarRival(texto, terms){
  let out = texto;
  terms.forEach(t=>{
    if(!t) return;
    const esc = t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    const re = t.includes(' ')
      ? new RegExp('\\b'+esc+'\\b', 'gi')
      : new RegExp('\\b'+esc+'\\w*', 'gi');
    out = out.replace(re, m => `<span class="masked-term">${m}</span>`);
  });
  return out;
}
const SELLO_KEYWORDS = {
  "Doce pasos": [/\bpenal(es)?\b/gi, /\bpena m[aá]xima\b/gi, /\bdoce pasos\b/gi, /\bpunto (blanco|penal)\b/gi],
  "Tiro libre": [/\btiro(s)?\s+libre(s)?\b/gi, /\bfalta directa\b/gi, /\bbal[oó]n detenido\b/gi, /\bbarrera(s)?\b/gi],
  "Gol de cabeza": [/\bcabezazo(s)?\b/gi, /\bcabece[oó]\w*\b/gi, /\btestarazo\b/gi, /\bde cabeza\b/gi],
  "Rebote": [/\brebote(s)?\b/gi, /\brechace\b/gi],
};
function ocultarSello(texto){
  let out = texto;
  Object.values(SELLO_KEYWORDS).forEach(pats=>{
    pats.forEach(re=>{ out = out.replace(re, m => `<span class="masked-term">${m}</span>`); });
  });
  return out;
}
function ocultarArquero(texto, arquero){
  const esc = arquero.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return texto.replace(new RegExp(esc,'gi'), m => `<span class="masked-term">${m}</span>`);
}
// para datos que NO son la respuesta de la categoría activa (ej. el arquero cuando se pregunta por el
// rival) no corresponde el efecto visual de "esto hay que adivinarlo": se quita el nombre de forma
// prolija, sin blur, para que la tarjeta no mezcle el lenguaje visual de dos categorías distintas.
function quitarNombreArquero(texto, arquero){
  const esc = arquero.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return texto.replace(new RegExp('\\s*'+esc, 'gi'), '');
}

const relatosParaSello = RELATOS.filter(r=>r.resena_trivia && r.sello_del_gol && r.sello_del_gol!=='Pura jugada');
const relatosParaArquero = RELATOS.filter(r=>r.resena_trivia && r.arquero);
const relatosParaAnio = RELATOS.filter(r=>r.resena_trivia);
const arquerosUnicos = [...new Set(RELATOS.map(r=>r.arquero).filter(Boolean))];

let racha = 0;

const TIPOS_PREGUNTA = ['rival','sello','arquero','anio'];
const POOLS = { rival:relatosParaRival, sello:relatosParaSello, arquero:relatosParaArquero, anio:relatosParaAnio };
const PREGUNTAS = {
  rival: '¿Contra qué rival gritó este gol la Albiceleste?',
  sello: '¿Qué tipo de definición tuvo este gol?',
  arquero: '¿A qué arquero le quedó grabada esta jugada?',
  anio: '¿En qué año quedó escrito este capítulo?'
};

// aperturas narrativas: puramente atmosféricas, sin ningún dato del partido, solo para variar el
// ángulo de relato entre pregunta y pregunta sin repetir siempre la misma estructura
// aperturas neutrales: valen para cualquier partido, no afirman nada sobre su trascendencia
const APERTURAS_NEUTRAS = [
  'La transmisión se corta un instante… y el relato sigue así:',
  'Cerrá los ojos e imaginate la escena:',
  'Así lo cuenta la crónica de aquel partido:',
  'Otra noche de Selección. Los hechos:',
];
// aperturas de tensión: solo tienen sentido cuando hay algo en juego (Mundial, Eliminatorias,
// Copa América). En un amistoso no hay "el estadio conteniendo la respiración" — no hay nada que perder.
const APERTURAS_TENSION = [
  'El estadio contiene la respiración. Así lo cuenta la crónica:',
  'Se juega mucho más que un resultado. Así ocurrió:',
];
let ultimaApertura = null;
function elegirApertura(competencia){
  const permiteTension = competencia !== 'Amistoso';
  const lista = permiteTension ? [...APERTURAS_NEUTRAS, ...APERTURAS_TENSION] : APERTURAS_NEUTRAS;
  let a;
  do{ a = lista[Math.floor(Math.random()*lista.length)]; } while(a===ultimaApertura && lista.length>1);
  ultimaApertura = a;
  return a;
}

let ultimoTipo = null;
function pickTrivia(){
  let tipo;
  do {
    tipo = TIPOS_PREGUNTA[Math.floor(Math.random()*TIPOS_PREGUNTA.length)];
  } while (tipo === ultimoTipo && TIPOS_PREGUNTA.length > 1);
  ultimoTipo = tipo;
  const pool = POOLS[tipo];
  const r = pool[Math.floor(Math.random()*pool.length)];
  triviaActual = { relato:r, tipo };

  let texto = r.resena_trivia;
  if(tipo==='rival'){
    const terminos = [...new Set([...r.rival_terms, ...(GENTILICIOS[r.rival]||[])])];
    texto = ocultarRival(texto, terminos);
    if(r.arquero) texto = quitarNombreArquero(texto, r.arquero);
  } else if(tipo==='sello'){
    texto = ocultarSello(texto);
  } else if(tipo==='arquero' && r.arquero){
    texto = ocultarArquero(texto, r.arquero);
  }
  document.getElementById('triviaQuestion').innerHTML =
    `<span class="apertura">${elegirApertura(r.competencia)}</span><br>${texto} <strong class="pregunta-final">${PREGUNTAS[tipo]}</strong>`;

  let metaPartes = [];
  if(tipo!=='anio') metaPartes.push(r.fecha);
  if(tipo!=='anio') metaPartes.push(r.competencia);
  if(tipo==='sello') metaPartes.push(r.estadio);
  document.getElementById('triviaMeta').textContent = metaPartes.join(' · ');

  // el mapa principal viaja hasta el punto del gol, como parte de la misma exploración.
  // En "rival"/"arquero" la ubicación delataría la respuesta: la cámara igual viaja, pero el
  // mapa queda con niebla y el punto exacto oculto hasta que se responde.
  const requiereRevelado = (tipo==='rival' || tipo==='arquero');
  triviaActual.requiereRevelado = requiereRevelado;
  mapSvg.classList.add('trivia-modo');
  mapVeil.classList.add('on');

  if(requiereRevelado){
    mapFog.classList.add('on');
    mapSvg.classList.add('oculto');
    focoGroup.innerHTML = '';
    focusOnPoint(r.svg_x, r.svg_y, 340, 1000);
  } else {
    mapFog.classList.remove('on');
    mapSvg.classList.remove('oculto');
    focusOnPoint(r.svg_x, r.svg_y, 95, 1000, ()=>{
      mostrarFoco(r.svg_x, r.svg_y, golRadius(r.goles_en_relato)*1.6, golColor(r.goles_en_relato));
    });
  }

  const optsEl = document.getElementById('triviaOptions');
  optsEl.innerHTML='';
  document.getElementById('nextBtn').classList.remove('show');
  const fb = document.getElementById('relatorFeedback');
  fb.className = 'relator-feedback';
  fb.textContent = '';

  let correct, options;
  if(tipo==='rival'){
    correct = r.rival;
    const mismoContexto = [...(rivalesPorCompetencia[r.competencia] || [])].filter(x=>x!==correct);
    let candidatos = mismoContexto.length >= 3 ? mismoContexto : rivales.filter(x=>x!==correct);
    const distractores = candidatos.sort(()=>Math.random()-0.5).slice(0,3);
    options = [correct, ...distractores].sort(()=>Math.random()-0.5);
  } else if(tipo==='sello'){
    correct = r.sello_del_gol;
    const sellos = [...new Set(RELATOS.map(x=>x.sello_del_gol).filter(Boolean))];
    const distractores = sellos.filter(x=>x!==correct).sort(()=>Math.random()-0.5).slice(0,3);
    options = [correct, ...distractores].sort(()=>Math.random()-0.5);
  } else if(tipo==='arquero'){
    correct = r.arquero;
    const distractores = arquerosUnicos.filter(x=>x!==correct).sort(()=>Math.random()-0.5).slice(0,3);
    options = [correct, ...distractores].sort(()=>Math.random()-0.5);
  } else {
    correct = String(r.anio);
    const cercanos = aniosUnicos.filter(x=>x!==r.anio)
      .sort((a,b)=>Math.abs(a-r.anio)-Math.abs(b-r.anio))
      .slice(0,6)
      .map(String);
    const distractores = cercanos.sort(()=>Math.random()-0.5).slice(0,3);
    options = [correct, ...distractores].sort(()=>Math.random()-0.5);
  }

  options.forEach(o=>{
    const btn = document.createElement('button');
    btn.className='opt-btn';
    btn.textContent=o;
    btn.onclick=()=>answerTrivia(btn,o,correct);
    optsEl.appendChild(btn);
  });
}

function lanzarConfeti(){
  let layer = document.querySelector('.confetti-layer');
  if(!layer){
    layer = document.createElement('div');
    layer.className = 'confetti-layer';
    document.body.appendChild(layer);
  }
  layer.innerHTML = '';
  const colores = ['#6EC3F5', '#FFB300', '#FAF8F2', '#2E86D6'];
  for(let i=0; i<26; i++){
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    const size = 5 + Math.random()*5;
    p.style.width = size+'px';
    p.style.height = (size*0.5)+'px';
    p.style.left = Math.random()*100+'%';
    p.style.top = '30%';
    p.style.background = colores[Math.floor(Math.random()*colores.length)];
    p.style.animationDelay = (Math.random()*0.3)+'s';
    p.style.animationDuration = (1+Math.random()*0.6)+'s';
    layer.appendChild(p);
  }
  setTimeout(()=>{ layer.innerHTML=''; }, 2000);
}

function lanzarRacha(n){
  lanzarConfeti();
  const banner = document.createElement('div');
  banner.className = 'racha-banner';
  banner.textContent = n===3 ? '⚽ ¡HAT-TRICK ALBICELESTE! 🔥' : `🔥 ¡RACHA DE ${n}!`;
  document.body.appendChild(banner);
  setTimeout(()=>banner.remove(), 1650);
}

function actualizarScoreUI(){
  document.querySelector('#triviaScore > span:first-child').textContent = `Respuestas correctas: ${triviaCorrectas} / ${triviaTotal}`;
  const pct = triviaTotal>0 ? Math.round((triviaCorrectas/triviaTotal)*100) : 0;
  document.getElementById('progresoFill').style.width = pct + '%';
  const indicador = document.getElementById('rachaIndicator');
  if(racha >= 2){
    indicador.textContent = `🔥 Racha x${racha}`;
    indicador.classList.add('show');
  } else {
    indicador.classList.remove('show');
  }
}

// frases de relator: dosificadas, varían y nunca repiten la anterior inmediata
const FRASES_ACIERTO = [
  '¡Gritalo con el alma! No fue casualidad, fue fútbol de verdad.',
  '¡Qué zurda, por Dios! La Zurda de Oro no perdona, y vos tampoco.',
  '¡Impecable! Puro conocimiento albiceleste.',
  '¡Ahí está! La memoria no perdona, como El Astro tampoco.',
  '¡Como una jugada maradoniana! Se vio clarísimo.',
  '¡Ahí la clavaste, como al ángulo! Ni el arquero llega a esa.',
  '¡Qué categoría! Eso no se explica, se siente.',
  '¡Golazo de memoria! Ni la mejor defensa te paraba esa.',
];
const FRASES_FALLO = [
  '¡La pasó besando el palo! Vamos de nuevo, no se resta nada.',
  'Rozó el travesaño y salió... casi, casi. A la próxima.',
  'Quedó pidiendo el VAR, pero no había nada que hacer. Seguimos.',
  'Se fue apenas desviado. El Astro perdona, acá también.',
  'Le faltó apenas un poco. Dale, que la próxima entra.',
  'Ni el mejor arquero la ataja siempre. Vamos con la que viene.',
];
let ultimaFrase = null;
function frasear(lista){
  let f;
  do{ f = lista[Math.floor(Math.random()*lista.length)]; } while(f===ultimaFrase && lista.length>1);
  ultimaFrase = f;
  return f;
}

function answerTrivia(btn, chosen, correct){
  document.querySelectorAll('.opt-btn').forEach(b=>{
    b.disabled=true;
    if(b.textContent===correct) b.classList.add('correct');
  });
  if(chosen!==correct) btn.classList.add('wrong');
  triviaTotal++;
  const acerto = chosen===correct;
  if(acerto){
    triviaCorrectas++;
    racha++;
    if(racha > 0 && racha % 3 === 0) lanzarRacha(racha);
  } else {
    racha = 0;
  }
  actualizarScoreUI();

  const fb = document.getElementById('relatorFeedback');
  fb.textContent = acerto ? frasear(FRASES_ACIERTO) : frasear(FRASES_FALLO);
  fb.className = 'relator-feedback show ' + (acerto ? 'ok' : 'no');

  // revelar el mapa y las palabras ocultas como parte de la respuesta, no antes
  const r = triviaActual.relato;
  if(triviaActual.requiereRevelado){
    mapFog.classList.remove('on');
    mapSvg.classList.remove('oculto');
    mostrarFoco(r.svg_x, r.svg_y, golRadius(r.goles_en_relato)*1.6, golColor(r.goles_en_relato));
    focusOnPoint(r.svg_x, r.svg_y, 70, 700);
  }
  document.querySelectorAll('#triviaQuestion .masked-term').forEach(el=>el.classList.add('revelado'));

  document.getElementById('nextBtn').classList.add('show');
}

function abrirTrivia(){
  triviaSheet.classList.add('open');
  triviaBtn.classList.add('hide');
  filterDrawer.classList.remove('open');
  filterToggle.classList.remove('active');
  triviaCorrectas = 0; triviaTotal = 0; racha = 0;
  actualizarScoreUI();
  pickTrivia();
}
function cerrarTrivia(){
  triviaSheet.classList.remove('open');
  triviaBtn.classList.remove('hide');
  mapSvg.classList.remove('trivia-modo','oculto');
  mapVeil.classList.remove('on');
  mapFog.classList.remove('on');
  focoGroup.innerHTML = '';
  resetMapView(1100);
}

triviaBtn.addEventListener('click', abrirTrivia);
document.getElementById('closeTrivia').addEventListener('click', cerrarTrivia);
document.getElementById('nextBtn').addEventListener('click', pickTrivia);

// ---------- ARRANQUE ----------
setStats();
buildFilterUI();
buildMarkers();
applyMarkerVisibility(filtered);

setTimeout(()=>{
  document.getElementById('mapHint').classList.add('show');
  setTimeout(()=>document.getElementById('mapHint').classList.remove('show'), 3200);
}, 600);

// Link directo a la trivia: agregar ?trivia=1 a la URL abre el juego solo
const params = new URLSearchParams(window.location.search);
if(params.get('trivia') === '1'){
  document.querySelector('.hud-top').style.display = 'none';
  document.getElementById('closeTrivia').style.display = 'none';
  setTimeout(abrirTrivia, 400);
}
</script>
